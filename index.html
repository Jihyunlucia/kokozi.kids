<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 딱 맞는 아띠 찾기 🏠</title>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #004589;
    --orange: #109723;
    --yellow: #6DC97A;
    --text: #FFFFFF;
    --mid: #FFFFFF;
    --card: #FFFFFF;
    --radius: 20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 15%, rgba(255,255,255,.04) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,.03) 0%, transparent 45%);
    pointer-events:none; z-index:0;
  }
  .wrap { max-width:460px; margin:0 auto; padding:20px 16px 40px; position:relative; z-index:1; background: var(--bg); min-height:100vh; }

  /* 결과지 전용 - 좌우 패딩 없애기 */
  .result.show { display:block; animation:slideUp .5s cubic-bezier(.34,1.56,.64,1); margin:0 -16px; }

  /* 인트로 */
  .intro { text-align:center; }
  .house { font-size:72px; display:block; animation:bob 3s ease-in-out infinite; margin-bottom:8px; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .brand { font-size:12px; font-weight:700; color:var(--orange); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:10px; }
  .intro h1 { font-size:24px; font-weight:900; color:var(--text); line-height:1.35; }
  .intro h1 em { color:var(--orange); font-style:normal; }
  .intro p { font-size:13px; color:var(--mid); line-height:1.65; margin-top:10px; }

  /* 히어로 이미지 */
  .hero-img-wrap {
    width: calc(100% + 32px);
    margin: -20px -16px 0;
    line-height: 0;
  }
  .hero-img {
    width: 100%; display: block;
    object-fit: cover;
  }

  .btn-start {
    display:block; width:100%;
    background:#CEFF6B;
    color:#1A3A1A; font-family:'Noto Sans KR',sans-serif;
    font-size:17px; font-weight:700; border:none;
    border-radius:16px; padding:18px; cursor:pointer;
    transition:all .2s; margin-top:16px;
  }
  .btn-start:hover { transform:translateY(-3px); filter:brightness(1.05); }
  .q-count { font-size:12px; color:var(--mid); margin-top:10px; }

  /* 진행바 */
  .prog-wrap { margin:0 0 16px; }
  .prog-label { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--mid); font-weight:600; margin-bottom:6px; }
  .btn-back {
    background:none; border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:12px;
    font-weight:600; color:var(--mid); padding:2px 0;
    transition:color .15s; line-height:1;
  }
  .btn-back:hover { color:var(--text); }
  .btn-back:disabled { opacity:0; pointer-events:none; }
  .prog-bar { height:8px; background:rgba(255,255,255,.2); border-radius:100px; overflow:hidden; }
  .prog-fill {
    height:100%;
    background:linear-gradient(90deg,var(--yellow),var(--orange));
    border-radius:100px;
    transition:width .5s cubic-bezier(.34,1.56,.64,1);
  }

  /* 질문 카드 */
  .q-card {
    background:var(--card); border-radius:var(--radius);
    padding:28px 22px 22px;
    box-shadow:0 4px 24px rgba(0,0,0,.08);
    animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(22px) scale(.97)} to{opacity:1;transform:none} }
  .q-step { font-size:11px; font-weight:700; color:var(--orange); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .q-emoji { font-size:44px; display:block; margin-bottom:10px; }
  .q-text { font-size:19px; font-weight:600; color:#1A1A2E; line-height:1.4; margin-bottom:5px; }
  .q-sub { font-size:13px; color:#5A5A7A; line-height:1.55; margin-bottom:22px; }

  .opts { display:flex; flex-direction:column; gap:9px; }
  .opt {
    display:flex; align-items:center; gap:13px;
    background:white; border:2px solid #E8E8F0;
    border-radius:14px; padding:13px 15px;
    cursor:pointer; text-align:left;
    font-family:'Noto Sans KR',sans-serif;
    width:100%; transition:all .18s ease;
  }
  .opt:hover { border-color:#C0E8C8; background:#F5FFF7; }
  .opt.selected {
    border-color:#109723; background:#F0FBF2;
    box-shadow:0 0 0 1px #109723;
  }
  .opt.selected .opt-t { color:#109723; }
  .opt-e { font-size:26px; flex-shrink:0; }
  .opt-t { font-size:14px; font-weight:600; color:#1A1A2E; line-height:1.35; transition:color .18s; }
  .opt-s { font-size:12px; color:#5A5A7A; margin-top:2px; }

  /* 다음 버튼 - 카드 바로 아래 */
  .btn-next-wrap {
    display:none;
    margin-top:12px;
    padding-bottom:16px;
  }
  .btn-next-wrap.show { display:block; }
  .btn-next {
    display:block; width:100%;
    background:#CEFF6B; color:#1A3A1A;
    font-family:'Noto Sans KR',sans-serif;
    font-size:17px; font-weight:700; border:none;
    border-radius:16px; padding:17px;
    cursor:pointer; transition:all .2s;
  }
  .btn-next:hover { filter:brightness(1.05); transform:translateY(-2px); }

  /* ── 결과 화면 ── */
  .result { display:none; }
  .result.show { display:block; animation:slideUp .5s cubic-bezier(.34,1.56,.64,1); margin:0 -16px -100px; }

  .result-img-wrap {
    position:relative;
    width:100%;
    /* 이미지 비율 440x2000 유지 */
    padding-bottom: calc(2000 / 440 * 100%);
  }
  .result-img-wrap img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:fill; display:block;
    border-radius:0;
    image-rendering:-webkit-optimize-contrast;
    image-rendering:crisp-edges;
    -ms-interpolation-mode:bicubic;
  }
  /* 투명 클릭 버튼 공통 */
  .result-btn {
    position:absolute;
    background:transparent;
    border:none; cursor:pointer;
    border-radius:14px;
    /* 디버그용: outline:2px solid red; */
    -webkit-tap-highlight-color: rgba(255,255,255,.15);
  }
  .result-btn:hover { background:transparent !important; }
  .result-btn:active { background:transparent !important; }
  .result-btn:focus { outline:none; background:transparent !important; }
  .hidden { display:none!important; }
</style>
</head>

window.loadHeroImg = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('heroImg');
    img.src = e.target.result;
    img.classList.remove('hidden');
    document.getElementById('heroPlaceholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

function render() {
  const q = QS[cur];
  const pct = Math.round(((cur + 1) / QS.length) * 100);

  document.getElementById('pLabel').textContent = `질문 ${cur+1} / ${QS.length}`;
  document.getElementById('pPct').textContent = `${pct}%`;
  document.getElementById('pFill').style.width = `${pct}%`;
  document.getElementById('qStep').textContent = `Q${cur+1}`;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qSub').textContent = q.sub;

  // 뒤로가기: 첫 질문이면 비활성
  document.getElementById('btnBack').disabled = cur === 0;

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-e">${opt.e}</span><div><div class="opt-t">${opt.t}</div>${opt.s ? `<div class="opt-s">${opt.s}</div>` : ''}</div>`;
    btn.onclick = () => selectOpt(btn, opt.sc);
    opts.appendChild(btn);
  });

  pendingScores = null;
  document.getElementById('btnNextWrap').classList.remove('show');

  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'slideUp .4s cubic-bezier(.34,1.56,.64,1)';
}

let pendingScores = null;

function selectOpt(btn, scores) {
  // 기존 선택 해제
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  // 선택 하이라이트
  btn.classList.add('selected');
  pendingScores = scores;
  // 다음 버튼 표시
  document.getElementById('btnNextWrap').classList.add('show');
}

function nextQ() {
  if (pendingScores === null) return;
  history.push({ cur, sc: {...sc} });
  Object.entries(pendingScores).forEach(([k, v]) => { if (sc[k] !== undefined) sc[k] += v; });
  pendingScores = null;
  document.getElementById('btnNextWrap').classList.remove('show');
  cur++;
  if (cur < QS.length) render();
  else showResult();
}

function pick(scores) {
  history.push({ cur, sc: {...sc} });
  Object.entries(scores).forEach(([k, v]) => { if (sc[k] !== undefined) sc[k] += v; });
  cur++;
  if (cur < QS.length) render();
  else showResult();
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  cur = prev.cur;
  sc = {...prev.sc};
  render();
}

  chatty:    '또박또박 발음과 한글 말놀이로 언어 표현력을 자연스럽게 키워줘요. 말이 한창 늘어나는 시기의 아이에게 최고예요.',
  babyshark: '아기상어 챈트로 영어 소리에 자연스럽게 노출돼요. 율동과 함께라 온몸으로 영어를 느낄 수 있어요.',
  pororo:    '좋아하는 뽀로로 캐릭터로 바른 생활습관 이야기를 들어요. 애착 캐릭터가 있으면 집중력이 훨씬 높아져요.',
  crong:     '뽀로로 세계관 속 크롱의 호기심 탐험 이야기예요. 공룡 좋아하는 아이라면 무조건 빠져들어요.',
};

// 성향별 결과 이미지 맵 (이미지 받으면 base64로 채움)
const RESULT_IMAGES = {
  dreamer:  'images/result_dreamer.png',   // 상상력 부자
  explorer: 'images/result_explorer.png',  // 꼬마 탐험가
  artist:   'images/result_artist.png',    // 리듬 아티스트
  social:   'images/result_social.png',    // 친구 사랑 소셜
  linguist: 'images/result_linguist.png',  // 언어 똑똑이
};

// 상상력 부자(dreamer) 이미지 기준 버튼 위치
// 5종 이미지가 같은 레이아웃이면 이 값 공유 가능
const BTN_POSITIONS = {
  pkg:    { top:'82.60%', left:'3.41%',  width:'93.18%', height:'5.25%' },
  kakao:  { top:'89.50%', left:'2.27%',  width:'32.95%', height:'10.00%' },
  retry:  { top:'89.50%', left:'32.95%', width:'34.09%', height:'10.00%' },
  kokozi: { top:'89.50%', left:'64.77%', width:'32.95%', height:'10.00%' },
};

function applyBtnPos() {
  const p = BTN_POSITIONS;
  const set = (el, pos) => {
    if (!el) return;
    Object.assign(el.style, pos);
  };
  set(document.getElementById('btnPkg'),    p.pkg);
  set(document.getElementById('btnKakao'),  p.kakao);
  set(document.getElementById('btnRetry'),  p.retry);
  set(document.getElementById('btnKokozi'), p.kokozi);
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');

  const sorted = Object.entries(sc).sort((a, b) => b[1] - a[1]);
  const [w1] = sorted[0];

  const personaId = PERSONA_MAP[w1] || 'explorer';
  const persona   = PERSONAS[personaId];

  // 성향별 이미지 교체
  const imgEl = document.getElementById('resultImg');
  if (RESULT_IMAGES[personaId]) {
    imgEl.src = RESULT_IMAGES[personaId];
  }
  // 이미지 비율 업데이트 (모두 같은 440x2000이면 불필요)
  applyBtnPos();

  // 패키지 링크 연결
  const PERSONA_TO_PKG = {
    explorer: 'explorer', dreamer: 'sleep',
    artist: 'energy', social: 'pororo', linguist: 'language',
  };
  const pkgId = PERSONA_TO_PKG[personaId] || 'explorer';
  const pkg   = PACKAGES.find(p => p.id === pkgId);

  // 카카오 공유 데이터
  shareData = {
    title: `우리 아이는 ${persona.type}이에요! 🎉`,
    desc:  `추천 패키지: ${pkg.name} · 코코지 어린이날 특집`,
  };

  const res = document.getElementById('result');
  res.classList.add('show');
  window.scrollTo({ top:0, behavior:'smooth' });
}


function reset() {
  cur = 0; history = []; Object.keys(sc).forEach(k => sc[k] = 0);
  document.getElementById('result').classList.remove('show');
  document.getElementById('intro').classList.remove('hidden');
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>
</body>
</html>
