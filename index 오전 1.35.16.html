<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 딱 맞는 아띠 찾기 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0;
    --orange: #109723;
    --yellow: #6DC97A;
    --text: #1A1A2E;
    --mid: #5A5A7A;
    --card: #FFFFFF;
    --radius: 20px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 15%, rgba(16,151,35,.12) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(16,151,35,.08) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(155,127,212,.07) 0%, transparent 55%);
    pointer-events:none; z-index:0;
  }
  .wrap { max-width:460px; margin:0 auto; padding:20px 16px 70px; position:relative; z-index:1; }

  /* 인트로 */
  .intro { text-align:center; }
  .house { font-size:72px; display:block; animation:bob 3s ease-in-out infinite; margin-bottom:8px; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .brand { font-size:12px; font-weight:700; color:var(--orange); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:10px; }
  .intro h1 { font-size:24px; font-weight:900; color:var(--text); line-height:1.35; }
  .intro h1 em { color:var(--orange); font-style:normal; }
  .intro p { font-size:13px; color:var(--mid); line-height:1.65; margin-top:10px; }

  /* 히어로 이미지 */
  .hero-img-wrap {
    width:100%; margin:22px 0;
    border-radius:20px; overflow:hidden;
    position:relative;
  }
  .hero-img {
    width:100%; display:block;
    border-radius:20px; object-fit:cover;
  }
  .hero-img-placeholder {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; width:100%; min-height:220px;
    border:2px dashed #D8D8E8; border-radius:20px;
    background:#F8F8FC; cursor:pointer;
    transition:border-color .2s, background .2s;
  }
  .hero-img-placeholder:hover { border-color:var(--orange); background:#F0FAF1; }
  .hero-img-placeholder-icon { font-size:40px; }
  .hero-img-placeholder-text { font-size:14px; font-weight:700; color:var(--mid); }
  .hero-img-placeholder-sub { font-size:12px; color:#AAAABB; }

  .btn-start {
    display:block; width:100%;
    background:linear-gradient(135deg,var(--yellow),var(--orange));
    color:white; font-family:'Noto Sans KR',sans-serif;
    font-size:17px; font-weight:700; border:none;
    border-radius:16px; padding:18px; cursor:pointer;
    box-shadow:0 6px 20px rgba(16,151,35,.35);
    transition:all .2s;
  }
  .btn-start:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(16,151,35,.45); }
  .q-count { font-size:12px; color:var(--mid); margin-top:10px; }

  /* 진행바 */
  .prog-wrap { margin:0 0 16px; }
  .prog-label { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--mid); font-weight:600; margin-bottom:6px; }
  .btn-back {
    background:none; border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:12px;
    font-weight:600; color:var(--mid); padding:2px 0;
    transition:color .15s; line-height:1;
  }
  .btn-back:hover { color:var(--text); }
  .btn-back:disabled { opacity:0; pointer-events:none; }
  .prog-bar { height:8px; background:#E8E8F0; border-radius:100px; overflow:hidden; }
  .prog-fill {
    height:100%;
    background:linear-gradient(90deg,var(--yellow),var(--orange));
    border-radius:100px;
    transition:width .5s cubic-bezier(.34,1.56,.64,1);
  }

  /* 질문 카드 */
  .q-card {
    background:var(--card); border-radius:var(--radius);
    padding:28px 22px 22px;
    box-shadow:0 4px 24px rgba(0,0,0,.08);
    animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(22px) scale(.97)} to{opacity:1;transform:none} }
  .q-step { font-size:11px; font-weight:700; color:var(--orange); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  .q-emoji { font-size:44px; display:block; margin-bottom:10px; }
  .q-text { font-size:19px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:5px; }
  .q-sub { font-size:13px; color:var(--mid); line-height:1.55; margin-bottom:22px; }

  .opts { display:flex; flex-direction:column; gap:9px; }
  .opt {
    display:flex; align-items:center; gap:13px;
    background:#F8F8FC; border:2px solid #EBEBF5;
    border-radius:14px; padding:13px 15px;
    cursor:pointer; text-align:left;
    font-family:'Noto Sans KR',sans-serif;
    width:100%; transition:all .18s ease;
  }
  .opt:hover { border-color:var(--yellow); background:#F0FAF1; transform:translateX(4px); }
  .opt:active { transform:scale(.98); }
  .opt-e { font-size:26px; flex-shrink:0; }
  .opt-t { font-size:14px; font-weight:600; color:var(--text); line-height:1.35; }
  .opt-s { font-size:12px; color:var(--mid); margin-top:2px; }

  /* ── 결과 화면 ── */
  .result { display:none; }
  .result.show { display:block; animation:slideUp .5s cubic-bezier(.34,1.56,.64,1); }

  /* 1. 성향 분석 카드 */
  .analysis-card {
    background:var(--text); border-radius:var(--radius);
    padding:26px 22px; margin-bottom:20px; color:white;
  }
  .analysis-top { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .analysis-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:.5; }
  .analysis-type { font-family:'Gaegu',cursive; font-size:24px; font-weight:700; }
  .analysis-keywords { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .analysis-kw { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:100px; padding:4px 12px; font-size:12px; font-weight:600; }
  .analysis-desc { font-size:13px; line-height:1.75; opacity:.82; }

  /* 2. 아띠 카드 */
  .arti-list-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:12px; }
  .arti-card { background:white; border-radius:var(--radius); box-shadow:0 3px 16px rgba(0,0,0,.07); margin-bottom:12px; display:flex; overflow:hidden; }
  .arti-card-accent { width:5px; flex-shrink:0; }
  .arti-card-body { padding:18px 16px; flex:1; }
  .arti-card-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .arti-card-emoji { font-size:28px; }
  .arti-card-meta {}
  .arti-card-name { font-size:15px; font-weight:700; color:var(--text); }
  .arti-card-sub { font-size:11px; color:var(--mid); margin-top:1px; }
  .arti-no1-badge { display:inline-block; background:var(--orange); color:white; font-size:10px; font-weight:700; border-radius:100px; padding:2px 8px; margin-left:6px; vertical-align:middle; }
  .arti-card-reason { font-size:13px; color:var(--mid); line-height:1.65; margin-bottom:10px; }
  .arti-card-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .arti-card-tag { background:#F4F4FA; border-radius:100px; padding:3px 10px; font-size:11px; font-weight:600; color:var(--mid); }

  /* 3. 패키지 배너 */
  .pkg-banner { background:linear-gradient(135deg,#EEF8EF,#D9F0DB); border:2px solid #6DC97A; border-radius:var(--radius); padding:22px 20px; margin:20px 0 12px; }
  .pkg-banner-eyebrow { font-size:11px; font-weight:700; color:var(--orange); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .pkg-banner-name { font-size:18px; font-weight:900; color:var(--text); margin-bottom:6px; }
  .pkg-banner-desc { font-size:13px; color:var(--mid); line-height:1.6; margin-bottom:14px; }
  .pkg-banner-artis { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .pkg-banner-arti { display:flex; align-items:center; gap:5px; background:white; border-radius:100px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .pkg-banner-price { display:flex; align-items:baseline; gap:8px; margin-bottom:14px; }
  .pkg-banner-original { font-size:12px; color:#BBBBCC; text-decoration:line-through; }
  .pkg-banner-sale { font-size:22px; font-weight:900; color:var(--text); }
  .pkg-banner-discount { background:var(--orange); color:white; font-size:11px; font-weight:700; border-radius:100px; padding:3px 9px; }
  .btn-pkg { display:block; width:100%; background:linear-gradient(135deg,var(--yellow),var(--orange)); color:white; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; border:none; border-radius:12px; padding:14px; cursor:pointer; text-align:center; text-decoration:none; box-shadow:0 3px 12px rgba(16,151,35,.3); transition:all .2s; }
  .btn-pkg:hover { transform:translateY(-2px); }
  .btn-reset { display:block; width:100%; background:transparent; color:var(--mid); font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:600; border:2px solid #E0E0EE; border-radius:14px; padding:13px; cursor:pointer; transition:all .2s; margin-top:10px; }
  .btn-reset:hover { border-color:var(--mid); color:var(--text); }
  .hidden { display:none!important; }
</style>
</head>
<body>
<div class="wrap">

<!-- 인트로 -->
<div id="intro" class="intro">
  <span class="house">🏠</span>
  <div class="brand">KOKOZI × 어린이날 특집</div>
  <h1>우리 아이 딱 맞는<br><em>아띠</em> 찾기 테스트</h1>
  <p>9개 질문으로 아이의 성향을 분석해<br>15종 아띠 중 딱 맞는 친구를 추천해드려요 ✨</p>

  <!-- 아띠 이미지 영역 -->
  <div class="hero-img-wrap">
    <img id="heroImg" src="" alt="아띠 이미지" class="hero-img hidden" />
    <label class="hero-img-placeholder" id="heroPlaceholder" for="heroImgInput">
      <span class="hero-img-placeholder-icon">🏠</span>
      <span class="hero-img-placeholder-text">아띠 이미지를 여기에 넣어주세요</span>
      <span class="hero-img-placeholder-sub">클릭하거나 이미지를 드래그하세요</span>
    </label>
    <input type="file" id="heroImgInput" accept="image/*" style="display:none" onchange="loadHeroImg(this)" />
  </div>

  <button class="btn-start" onclick="start()">🎯 테스트 시작하기</button>
  <p class="q-count">총 9문항 · 약 2분 소요</p>
</div>

<!-- 퀴즈 -->
<div id="quiz" class="hidden">
  <div class="prog-wrap">
    <div class="prog-label">
      <button class="btn-back" id="btnBack" onclick="goBack()">← 이전</button>
      <span id="pLabel">질문 1 / 9</span>
      <span id="pPct">11%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:11%"></div></div>
  </div>
  <div class="q-card" id="qCard">
    <div class="q-step" id="qStep">Q1</div>
    <span class="q-emoji" id="qEmoji"></span>
    <div class="q-text" id="qText"></div>
    <div class="q-sub" id="qSub"></div>
    <div class="opts" id="opts"></div>
  </div>
</div>

<!-- 결과 -->
<div id="result" class="result">

  <!-- 1. 성향 분석 카드 -->
  <div class="analysis-card">
    <div class="analysis-top">
      <div class="analysis-label">분석 완료</div>
      <div class="analysis-type" id="analysisType"></div>
    </div>
    <div class="analysis-keywords" id="analysisKeywords"></div>
    <div class="analysis-desc" id="analysisDesc"></div>
  </div>

  <!-- 2. 아띠 3종 -->
  <div class="arti-list-title">딱 맞는 아띠 3종 🏠</div>

  <div id="artiCards"></div>

  <!-- 3. 패키지 (1개) -->
  <div class="pkg-banner" id="pkgBanner">
    <div class="pkg-banner-eyebrow">🎁 어린이날 특별 패키지</div>
    <div class="pkg-banner-name" id="pkgBannerName"></div>
    <div class="pkg-banner-desc" id="pkgBannerDesc"></div>
    <div class="pkg-banner-artis" id="pkgBannerArtis"></div>
    <div class="pkg-banner-price">
      <span class="pkg-banner-original" id="pkgBannerOriginal"></span>
      <span class="pkg-banner-sale" id="pkgBannerSale"></span>
      <span class="pkg-banner-discount" id="pkgBannerDiscount"></span>
    </div>
    <a href="https://kokozi.com/kr/shop/arti" target="_blank" class="btn-pkg">패키지 보러가기 →</a>
  </div>

  <button class="btn-reset" onclick="reset()">↩️ 다시 테스트하기</button>
</div>

</div>
<script defer>
const ARTIS = {
  brainee:  { name:"브레이니", emoji:"🚀", ip:"오리지널",     tag:"우주를 누비는 꼬마 과학자의 친구",          grad:"linear-gradient(135deg,#5BA4CF,#2E74B0)", content:["어린이과학동아","우주·지구 이야기","공룡 백과","과학 실험 동화"], forKid:"\"왜요?\"가 입에 붙은 아이, 별·공룡·곤충에 눈이 반짝이는 아이, 백과사전을 끝없이 보는 아이에게 딱이에요.", forPar:"어린이과학동아 독점 콘텐츠로 과학적 호기심을 자연스럽게 키워줘요. 스크린 없이도 지식 탐구가 가능해요.", match:"탐구심 넘치는 아이에게 최고의 지식 파트너예요!" },
  nobel:    { name:"노벨",   emoji:"✨", ip:"오리지널",     tag:"이야기 나라를 여행하는 꼬마 모험가의 친구",    grad:"linear-gradient(135deg,#9B7FD4,#6A4FB8)", content:["세계 명작 동화","창작 판타지","전래 동화","마법 모험 이야기"], forKid:"동화책이라면 질리지 않는 아이, 상상 속 세계를 좋아하는 아이에게 완벽해요.", forPar:"국내 최고 성우진의 몰입감 있는 동화. 상상력과 언어 발달에 큰 도움이 돼요.", match:"이야기를 사랑하는 아이에게 매일 새로운 세계를 열어줄 거예요!" },
  groovie:  { name:"그루비", emoji:"🎵", ip:"오리지널",     tag:"노래하고 춤추는 감성 뮤지컬의 친구",          grad:"linear-gradient(135deg,#F6739A,#D04575)", content:["감성 동요","국악 뮤지컬","율동 동요","감정 이야기"], forKid:"음악만 들으면 몸이 저절로 움직이는 아이, 노래를 흥얼거리고 춤추는 아이에게 최고예요.", forPar:"정서 발달과 리듬감에 탁월해요. 국악 뮤지컬로 우리 음악도 자연스럽게 익혀요.", match:"춤추고 노래하는 아이에게 매일매일 파티 친구가 될 거예요!" },
  jubi:     { name:"쥬비",   emoji:"🌍", ip:"오리지널",     tag:"재미있게 영어를 배우는 언어 천재의 친구",      grad:"linear-gradient(135deg,#4CAF7D,#2A7A52)", content:["영어 말놀이","영어 챈트송","영어 동화","파닉스 동요"], forKid:"영어 소리에 자연스럽게 반응하는 아이, 외국어 표현에 호기심이 많은 아이에게 딱이에요.", forPar:"EBS 스타강사 케일린의 영어 말놀이 콘텐츠 탑재. 흘려듣기로 영어 귀를 자연스럽게 만들어줘요.", match:"언어 감각이 뛰어난 아이에게 가장 재미있는 영어 선생님이에요!" },
  tobit:    { name:"토빗",   emoji:"🐰", ip:"오리지널",     tag:"재잘재잘 말놀이 고수의 친구",                  grad:"linear-gradient(135deg,#FFD84D,#FFA726)", content:["한국어 말놀이","수수께끼","동음이의어 놀이","재미있는 동요"], forKid:"수다스럽고 말하는 걸 좋아하는 아이, 말장난·수수께끼를 즐기는 아이에게 완벽해요.", forPar:"우리말의 재미를 자연스럽게 익히도록 도와줘요. 어휘력과 표현력이 부쩍 늘어나요.", match:"수다쟁이 아이에게 함께 말놀이할 최고의 단짝이에요!" },

let cur = 0;

window.loadHeroImg = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('heroImg');
    img.src = e.target.result;
    img.classList.remove('hidden');
    document.getElementById('heroPlaceholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

window.start = function() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  render();
}

window.goBack = goBack;
window.reset = reset;

function render() {
  const q = QS[cur];
  const pct = Math.round(((cur + 1) / QS.length) * 100);

  document.getElementById('pLabel').textContent = `질문 ${cur+1} / ${QS.length}`;
  document.getElementById('pPct').textContent = `${pct}%`;
  document.getElementById('pFill').style.width = `${pct}%`;
  document.getElementById('qStep').textContent = `Q${cur+1}`;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qSub').textContent = q.sub;

  // 뒤로가기: 첫 질문이면 비활성
  document.getElementById('btnBack').disabled = cur === 0;

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-e">${opt.e}</span><div><div class="opt-t">${opt.t}</div>${opt.s ? `<div class="opt-s">${opt.s}</div>` : ''}</div>`;
    btn.onclick = () => pick(opt.sc);
    opts.appendChild(btn);
  });

  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'slideUp .4s cubic-bezier(.34,1.56,.64,1)';
}

function pick(scores) {
  // 현재 상태 스냅샷 저장 (뒤로가기용)
  history.push({ cur, sc: {...sc} });
  Object.entries(scores).forEach(([k, v]) => { if (sc[k] !== undefined) sc[k] += v; });
  cur++;
  if (cur < QS.length) render();
  else showResult();
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  cur = prev.cur;
  sc = {...prev.sc};
  render();
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');

  const sorted = Object.entries(sc).sort((a, b) => b[1] - a[1]);
  const [w1] = sorted[0];
  const [w2] = sorted[1];
  const [w3] = sorted[2];

  // 1. 성향 분석
  const personaId = PERSONA_MAP[w1] || 'explorer';
  const persona = PERSONAS[personaId];
  document.getElementById('analysisType').textContent = persona.type;
  document.getElementById('analysisDesc').textContent = persona.desc;
  const kwEl = document.getElementById('analysisKeywords');
  kwEl.innerHTML = '';
  persona.keywords.forEach(k => {
    const s = document.createElement('span');
    s.className = 'analysis-kw'; s.textContent = k;
    kwEl.appendChild(s);
  });

  // 2. 아띠 3종 카드
  const container = document.getElementById('artiCards');
  container.innerHTML = '';
  [w1, w2, w3].forEach((id, i) => {
    const a = ARTIS[id];
    // accent 색: grad 에서 첫 색상 추출
    const accentColor = a.grad.match(/#[0-9A-Fa-f]{6}/)?.[0] || '#FFD84D';
    const card = document.createElement('div');
    card.className = 'arti-card';
    card.innerHTML = `
      <div class="arti-card-accent" style="background:${accentColor}"></div>
      <div class="arti-card-body">
        <div class="arti-card-top">
          <span class="arti-card-emoji">${a.emoji}</span>
          <div class="arti-card-meta">
            <div class="arti-card-name">${a.name} 아띠${i === 0 ? '<span class="arti-no1-badge">1순위</span>' : ''}</div>
            <div class="arti-card-sub">${a.tag}</div>
          </div>
        </div>
        <div class="arti-card-reason">${ARTI_REASON[id]}</div>
        <div class="arti-card-tags">${a.content.map(c => `<span class="arti-card-tag">${c}</span>`).join('')}</div>
      </div>
    `;
    container.appendChild(card);
  });

  // 3. 패키지 1개
  renderPackage(w1, w2, w3);

  const res = document.getElementById('result');
  res.classList.add('show');
  res.scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderPackage(w1, w2, w3) {
  const top3 = [w1, w2, w3];
  const best = PACKAGES
    .map(p => ({ p, hits: top3.filter(id => p.triggerArtis.includes(id)).length }))
    .sort((a, b) => b.hits - a.hits)[0].p;

  const discount = Math.round((1 - best.salePrice / best.originalPrice) * 100);

  document.getElementById('pkgBannerName').textContent = best.name;
  document.getElementById('pkgBannerDesc').textContent = best.matchMsg;
  document.getElementById('pkgBannerOriginal').textContent = '₩' + best.originalPrice.toLocaleString();
  document.getElementById('pkgBannerSale').textContent = '₩' + best.salePrice.toLocaleString();
  document.getElementById('pkgBannerDiscount').textContent = discount + '% 할인';

  const artisEl = document.getElementById('pkgBannerArtis');
  artisEl.innerHTML = '';
  best.artis.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'pkg-banner-arti';
    chip.innerHTML = `<span>${a.e}</span><span>${a.name}</span>`;
    artisEl.appendChild(chip);
  });
}

function reset() {
  cur = 0; history = []; Object.keys(sc).forEach(k => sc[k] = 0);
  document.getElementById('result').classList.remove('show');
  document.getElementById('intro').classList.remove('hidden');
  window.scrollTo({ top:0, behavior:'smooth' });
}
